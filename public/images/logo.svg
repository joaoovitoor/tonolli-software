<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 530" width="600" height="530">
  <defs>
    <clipPath id="clip">
      <path d="M300,55 Q458,228 502,440 C516,453 513,469 490,473 Q300,483 110,473 C87,469 84,453 98,440 Q142,228 300,55Z"/>
    </clipPath>
    <linearGradient id="gLeft" x1="112" y1="108" x2="296" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="12%"  stop-color="#F4F4F4"/>
      <stop offset="32%"  stop-color="#D2D2D2"/>
      <stop offset="54%"  stop-color="#909090"/>
      <stop offset="76%"  stop-color="#484848"/>
      <stop offset="92%"  stop-color="#242424"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <linearGradient id="gRight" x1="488" y1="136" x2="304" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F6F6F6"/>
      <stop offset="14%"  stop-color="#E8E8E8"/>
      <stop offset="36%"  stop-color="#BEBEBE"/>
      <stop offset="58%"  stop-color="#787878"/>
      <stop offset="78%"  stop-color="#3A3A3A"/>
      <stop offset="93%"  stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="gBottom" x1="300" y1="464" x2="300" y2="265" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0A0A0A"/>
      <stop offset="20%"  stop-color="#242424"/>
      <stop offset="48%"  stop-color="#545454"/>
      <stop offset="74%"  stop-color="#424242"/>
      <stop offset="100%" stop-color="#2C2C2C"/>
    </linearGradient>
    <radialGradient id="gCenter" cx="300" cy="250" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#030303"/>
      <stop offset="40%"  stop-color="#0C0C0C"/>
      <stop offset="78%"  stop-color="#181818" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gTopSpec" cx="300" cy="98" r="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.68)"/>
      <stop offset="22%"  stop-color="rgba(255,255,255,0.30)"/>
      <stop offset="52%"  stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="gLeftSpec" cx="180" cy="200" r="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="55%"  stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="gBottomEdge" x1="300" y1="483" x2="300" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
    <filter id="fDrop" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
    <filter id="fGroove" x="-4%" y="-4%" width="108%" height="108%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
    <filter id="fEdge" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="300" cy="496" rx="190" ry="12" fill="rgba(0,0,0,0.36)" filter="url(#fDrop)"/>

  <!-- Face esquerda -->
  <path clip-path="url(#clip)" d="M300,262 L300,-600 L-780,1350 Z" fill="url(#gLeft)"/>
  <!-- Face direita -->
  <path clip-path="url(#clip)" d="M300,262 L300,-600 L1380,1350 Z" fill="url(#gRight)"/>
  <!-- Face inferior -->
  <path clip-path="url(#clip)" d="M300,262 L-780,1350 L1380,1350 Z" fill="url(#gBottom)"/>

  <!-- Centro escuro -->
  <ellipse clip-path="url(#clip)" cx="300" cy="250" rx="72" ry="65" fill="url(#gCenter)"/>

  <!-- Grooves -->
  <g clip-path="url(#clip)" filter="url(#fGroove)">
    <line x1="300" y1="55"  x2="300" y2="262" stroke="#020202" stroke-width="9" stroke-linecap="round" opacity="0.92"/>
    <line x1="300" y1="262" x2="100" y2="455" stroke="#020202" stroke-width="9" stroke-linecap="round" opacity="0.92"/>
    <line x1="300" y1="262" x2="500" y2="455" stroke="#020202" stroke-width="9" stroke-linecap="round" opacity="0.92"/>
  </g>

  <!-- Highlight especular topo -->
  <path clip-path="url(#clip)" d="M300,55 Q458,228 502,440 C516,453 513,469 490,473 Q300,483 110,473 C87,469 84,453 98,440 Q142,228 300,55Z" fill="url(#gTopSpec)"/>

  <!-- Reflexo secundário face esquerda -->
  <path clip-path="url(#clip)" d="M300,262 L300,-600 L-780,1350 Z" fill="url(#gLeftSpec)"/>

  <!-- Escurecimento borda inferior -->
  <path clip-path="url(#clip)" d="M90,445 Q300,495 510,445 L512,483 Q300,490 88,483 Z" fill="url(#gBottomEdge)"/>

  <!-- Shadow rim interno -->
  <path clip-path="url(#clip)" d="M300,55 Q458,228 502,440 C516,453 513,469 490,473 Q300,483 110,473 C87,469 84,453 98,440 Q142,228 300,55Z" fill="none" stroke="rgba(30,30,30,0.45)" stroke-width="8"/>

  <!-- Brilho borda externa (cromo) -->
  <path d="M300,55 Q458,228 502,440 C516,453 513,469 490,473 Q300,483 110,473 C87,469 84,453 98,440 Q142,228 300,55Z" fill="none" stroke="rgba(215,215,215,0.58)" stroke-width="2" filter="url(#fEdge)"/>
</svg>
