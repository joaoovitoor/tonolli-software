<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    Faceted gem ‚Äî upward-pointing crystal triangle
    4-face pyramid with center inner ridge at (24,27)
    Internal "inverted-Y" structure creates 3D gem/crystal effect:
      Face 1 (upper-left, brightest): apex‚Üíbottom-left‚Üíinner
      Face 2 (lower-left, medium):    bottom-left‚Üíbottom-center‚Üíinner
      Face 3 (upper-right, dark):     apex‚Üíinner‚Üíbottom-right
      Face 4 (lower-right, darkest):  inner‚Üíbottom-center‚Üíbottom-right
    Bottom notch + left-edge specular complete the 3D illusion
  -->

  <!-- Face 1: upper-left ‚Äî most illuminated (bright silver) -->
  <path d="M24 5 L4 43 L24 27 Z" fill="#c8ccd8"/>

  <!-- Face 2: lower-left ‚Äî partial light (medium gray) -->
  <path d="M4 43 L24 43 L24 27 Z" fill="#888ca0"/>

  <!-- Face 3: upper-right ‚Äî shadow face (dark charcoal) -->
  <path d="M24 5 L24 27 L44 43 Z" fill="#4c5062"/>

  <!-- Face 4: lower-right ‚Äî deepest shadow (near-black) -->
  <path d="M24 27 L24 43 L44 43 Z" fill="#282c3a"/>

  <!-- Bottom notch -->
  <path d="M20 43 L24 38 L28 43 Z" fill="#080c18"/>

  <!-- Left edge specular rim -->
  <line x1="24" y1="5" x2="4" y2="43" stroke="rgba(255,255,255,0.42)" stroke-width="0.9" stroke-linecap="round"/>
</svg>
