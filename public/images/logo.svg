<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    Faceted gem — 5 triangular faces + notch
    Light source: upper right
    Geometry pivot: (24,7) top-center, (24,41) bottom tip
    Edge midpoints: M_L=(15,24) on left outer edge, M_R=(33,24) on right outer edge
  -->

  <!-- Left upper — ambient side light -->
  <path d="M6 7 L24 7 L15 24 Z" fill="#a8c8e0"/>
  <!-- Left lower — shadow face -->
  <path d="M24 7 L15 24 L24 41 Z" fill="#4e7fa0"/>

  <!-- Right upper — main lit face (catches direct light) -->
  <path d="M24 7 L42 7 L33 24 Z" fill="#ffffff"/>
  <!-- Right lower — partially lit -->
  <path d="M24 7 L33 24 L24 41 Z" fill="#b8d8ee"/>

  <!-- Center ridge highlight (below notch) -->
  <line x1="24" y1="20" x2="24" y2="41" stroke="rgba(255,255,255,0.13)" stroke-width="0.8"/>

  <!-- Notch — deep shadow facet, same as original -->
  <path d="M15 7 L24 19 L33 7 Z" fill="#060d18"/>

  <!-- Specular rim on top-right edge -->
  <line x1="24" y1="7" x2="42" y2="7" stroke="rgba(255,255,255,0.55)" stroke-width="0.7" stroke-linecap="round"/>
</svg>
