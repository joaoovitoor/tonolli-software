<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    Faceted gem — T in triangle
    Silhouette: (6,7)→(42,7)→(24,41) downward triangle
    5 faces: left-upper, left-lower, right-upper, right-lower + notch
    Notch wider+deeper → strong T crossbar / stem separation
      Left arm:  6→13 (7u)   Right arm:  35→42 (7u)
      Depth:     y=26 (56% down) → clear "neck" between bar and stem
  -->

  <!-- Left upper — ambient face (T crossbar left half) -->
  <path d="M6 7 L24 7 L15 24 Z" fill="#a8c8e0"/>
  <!-- Left lower — shadow face (T stem left side) -->
  <path d="M24 7 L15 24 L24 41 Z" fill="#4e7fa0"/>

  <!-- Right upper — main lit face (T crossbar right half) -->
  <path d="M24 7 L42 7 L33 24 Z" fill="#ffffff"/>
  <!-- Right lower — partially lit (T stem right side) -->
  <path d="M24 7 L33 24 L24 41 Z" fill="#b8d8ee"/>

  <!-- Center ridge highlight (stem, below notch tip) -->
  <line x1="24" y1="27" x2="24" y2="41" stroke="rgba(255,255,255,0.13)" stroke-width="0.8"/>

  <!-- Notch — wider + deeper for clear T shape -->
  <path d="M13 7 L24 26 L35 7 Z" fill="#060d18"/>

  <!-- Specular rim on top-right edge -->
  <line x1="24" y1="7" x2="42" y2="7" stroke="rgba(255,255,255,0.55)" stroke-width="0.7" stroke-linecap="round"/>
</svg>
