<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!--
    White variant — same 4-face upward-pointing crystal triangle
    For use on dark solid backgrounds (all tones shifted to white/light range)
  -->

  <!-- Face 1: upper-left — bright white -->
  <path d="M24 5 L4 43 L24 27 Z" fill="#ffffff"/>

  <!-- Face 2: lower-left — light gray -->
  <path d="M4 43 L24 43 L24 27 Z" fill="#c0c4d0"/>

  <!-- Face 3: upper-right — medium gray -->
  <path d="M24 5 L24 27 L44 43 Z" fill="#8c90a0"/>

  <!-- Face 4: lower-right — darker gray -->
  <path d="M24 27 L24 43 L44 43 Z" fill="#606474"/>

  <!-- Left edge specular rim -->
  <line x1="24" y1="5" x2="4" y2="43" stroke="rgba(255,255,255,0.7)" stroke-width="0.9" stroke-linecap="round"/>
</svg>
