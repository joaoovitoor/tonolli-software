<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    icon.svg — 32x32 scaled version of logo.svg
    Same proportions: arm=7/36 ≈ 4.67u, notch depth=19/34 ≈ 56%
    Left arm:  4→9 (5u)   Right arm:  23→28 (5u)   Depth: y=17
  -->

  <!-- Left upper -->
  <path d="M4 5 L16 5 L10 16 Z" fill="#a8c8e0"/>
  <!-- Left lower -->
  <path d="M16 5 L10 16 L16 27 Z" fill="#4e7fa0"/>

  <!-- Right upper -->
  <path d="M16 5 L28 5 L22 16 Z" fill="#ffffff"/>
  <!-- Right lower -->
  <path d="M16 5 L22 16 L16 27 Z" fill="#b8d8ee"/>

  <!-- Center ridge highlight -->
  <line x1="16" y1="18" x2="16" y2="27" stroke="rgba(255,255,255,0.13)" stroke-width="0.6"/>

  <!-- Notch — wider + deeper -->
  <path d="M9 5 L16 17 L23 5 Z" fill="#060d18"/>

  <!-- Specular rim -->
  <line x1="16" y1="5" x2="28" y2="5" stroke="rgba(255,255,255,0.55)" stroke-width="0.5" stroke-linecap="round"/>
</svg>
