<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    icon.svg — 32x32 favicon, scaled from logo.svg (48x48 → 32x32, factor 2/3)
    4-face pyramid: apex(16,3) base(3,29)→(29,29) inner(16,18)
  -->

  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0b1020"/>

  <!-- Face 1: upper-left — bright silver -->
  <path d="M16 3 L3 29 L16 18 Z" fill="#c8ccd8"/>

  <!-- Face 2: lower-left — medium gray -->
  <path d="M3 29 L16 29 L16 18 Z" fill="#888ca0"/>

  <!-- Face 3: upper-right — dark charcoal -->
  <path d="M16 3 L16 18 L29 29 Z" fill="#4c5062"/>

  <!-- Face 4: lower-right — deepest shadow -->
  <path d="M16 18 L16 29 L29 29 Z" fill="#282c3a"/>

  <!-- Bottom notch -->
  <path d="M13 29 L16 25 L19 29 Z" fill="#0b1020"/>

  <!-- Left edge specular -->
  <line x1="16" y1="3" x2="3" y2="29" stroke="rgba(255,255,255,0.42)" stroke-width="0.7" stroke-linecap="round"/>
</svg>
