<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    icon.svg — 32x32 favicon, transparent background, triangle only
    4-face pyramid: apex(16,3) base(3,29)→(29,29) inner(16,18)
  -->

  <!-- Face 1: upper-left — bright silver -->
  <path d="M16 3 L3 29 L16 18 Z" fill="#c8c9cb"/>

  <!-- Face 2: lower-left — medium gray -->
  <path d="M3 29 L16 29 L16 18 Z" fill="#888a8e"/>

  <!-- Face 3: upper-right — dark charcoal -->
  <path d="M16 3 L16 18 L29 29 Z" fill="#4a4b50"/>

  <!-- Face 4: lower-right — deepest shadow -->
  <path d="M16 18 L16 29 L29 29 Z" fill="#282930"/>

  <!-- Left edge specular -->
  <line x1="16" y1="3" x2="3" y2="29" stroke="rgba(255,255,255,0.45)" stroke-width="0.7" stroke-linecap="round"/>
</svg>
