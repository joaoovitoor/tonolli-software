<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <!--
    apple-icon.svg — 180x180 Apple touch icon, transparent background, triangle only
    4-face pyramid: apex(90,18) base(18,162)?(162,162) inner(90,108)
  -->

  <!-- Face 1: upper-left — bright silver -->
  <path d="M90 18 L18 162 L90 108 Z" fill="#c8c9cb"/>

  <!-- Face 2: lower-left — medium gray -->
  <path d="M18 162 L90 162 L90 108 Z" fill="#888a8e"/>

  <!-- Face 3: upper-right — dark charcoal -->
  <path d="M90 18 L90 108 L162 162 Z" fill="#4a4b50"/>

  <!-- Face 4: lower-right — deepest shadow -->
  <path d="M90 108 L90 162 L162 162 Z" fill="#282930"/>

  <!-- Left edge specular -->
  <line x1="90" y1="18" x2="18" y2="162" stroke="rgba(255,255,255,0.45)" stroke-width="4" stroke-linecap="round"/>
</svg>
