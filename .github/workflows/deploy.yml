name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild anual: os "X+ anos de experiencia" sao calculados no build
  # (src/lib/content.ts) — garante a virada do numero todo dia 02/jan
  schedule:
    - cron: "0 6 2 1 *"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 335b1b085d6c5df4903cc57d89e4e4fc
          command: pages deploy out --project-name tonolli-software --commit-dirty=true
